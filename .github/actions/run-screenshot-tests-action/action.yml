name: "Run screenshot tests"

inputs:
  exec-data-cache-key:
    description: "Cache key used for screenshot test execution data. Required for determining code coverage."
    required: false

runs:
  using: composite
  steps:
    - id: run-screenshot-tests
      name: "Run screenshot tests"
      shell: bash
      run: |
        ./gradlew validateDebugScreenshotTest --max-workers 1
        ./gradlew copyScreenshotTestExecData

    - name: "Archive screenshot diff images"
      if: ${{ failure() && steps.run-screenshot-tests.conclusion == 'failure' && inputs.exec-data-cache-key != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: "screenshot-diff-images-${{ github.event.pull_request.number }}"
        path: |
          ${{ github.workspace }}/**/src/screenshotTestDebug/reference
          ${{ github.workspace }}/**/build/outputs/screenshotTest-results/preview/debug/rendered
          ${{ github.workspace }}/**/build/outputs/screenshotTest-results/preview/debug/diffs
        if-no-files-found: warn
        retention-days: 14
        overwrite: true

    - name: "Clear any previously cached execution data"
      if: ${{ inputs.exec-data-cache-key != '' }}
      continue-on-error: true
      shell: bash
      run: gh cache delete "${{ inputs.exec-data-cache-key }}"

    - name: "Cache test execution data"
      if: ${{ inputs.exec-data-cache-key != '' }}
      uses: actions/cache/save@v4
      with:
        path: ${{ github.workspace }}/build/exec-data/screenshot-tests
        key: ${{ inputs.exec-data-cache-key }}

    - name: "Archive test execution data"
      if: ${{ inputs.exec-data-cache-key != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: "unit-tests-exec-data-${{ github.event.pull_request.number }}"
        path: ${{ github.workspace }}/build/exec-data/screenshot-tests
        if-no-files-found: error
        retention-days: 14
        overwrite: true
